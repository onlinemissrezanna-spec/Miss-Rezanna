<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - MISS REZANNA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --color-gold: #c3a167;
      --color-gold-hover: #b28e54;
    }
    body {
      background-color: #fbfbfb;
      font-family: 'Inter', sans-serif;
      margin: 0;
    }
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    /* Login Page */
    .login-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #111;
      display: flex; justify-content: center; align-items: center;
      z-index: 2000;
      transition: opacity 0.5s ease;
    }
    .login-card {
      background: #fff;
      padding: 48px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      text-align: center;
    }
    .login-logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      letter-spacing: 0.15em;
      margin-bottom: 32px;
      text-transform: uppercase;
    }
    .login-form input {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid #ddd;
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
    }
    .login-form button {
      width: 100%;
      padding: 14px;
      background: #111;
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.3s;
    }
    .login-form button:hover {
      background: var(--color-gold);
    }
    .login-hint {
      margin-top: 24px;
      font-size: 12px;
      color: #666;
      border-top: 1px solid #eee;
      padding-top: 16px;
    }

    /* Dashboard Header */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      border-bottom: 1px solid #eee;
      padding-bottom: 24px;
    }
    .admin-brand {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .btn-logout {
      background: none;
      border: 1px solid #111;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-logout:hover {
      background: #111;
      color: #fff;
    }

    /* Metrics Grid */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }
    .metric-card {
      background: #fff;
      padding: 32px;
      border: 1px solid #eee;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .metric-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
      margin-bottom: 12px;
    }
    .metric-value {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 500;
    }

    /* Orders Section */
    .orders-section {
      background: #fff;
      border: 1px solid #eee;
      padding: 32px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 24px;
    }
    .table-responsive {
      width: 100%;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th, td {
      padding: 16px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    th {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
      color: #666;
      font-weight: 600;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
      border-radius: 2px;
    }
    .badge-paid { background: #e6f4ea; color: #137333; }
    .badge-pending { background: #fef7e0; color: #b06000; }
    .badge-failed { background: #fce8e6; color: #c5221f; }
    
    select.status-select {
      padding: 6px 12px;
      border: 1px solid #ddd;
      font-family: inherit;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
    }

    /* Order Details Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .modal-card {
      background: #fff;
      width: 90%;
      max-width: 600px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid #eee;
      padding-bottom: 16px;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      margin: 0;
    }
    .btn-close-modal {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
    }
    .details-row {
      margin-bottom: 16px;
      font-size: 14px;
    }
    .details-label {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11px;
      color: #666;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .order-items-list {
      margin-top: 24px;
      border-top: 1px solid #eee;
      padding-top: 24px;
    }
    .order-item-detail {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px dotted #eee;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Login Modal -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-logo">MISS REZANNA</div>
      <form class="login-form" id="loginForm">
        <input type="email" id="loginEmail" placeholder="Admin Email" required value="admin@missrezanna.com">
        <input type="password" id="loginPassword" placeholder="Password" required value="admin123">
        <button type="submit" id="btnSubmitLogin">Secure Sign In</button>
      </form>
      <div class="login-hint">
        <strong>Seeded Credentials:</strong><br>
        Email: <code>admin@missrezanna.com</code><br>
        Password: <code>admin123</code>
      </div>
    </div>
  </div>

  <div class="admin-container">
    <!-- Header -->
    <header class="admin-header">
      <div class="admin-brand">MISS REZANNA <span style="font-size: 12px; color: var(--color-gold); vertical-align: top; letter-spacing: 0.05em; font-family: 'Inter', sans-serif;">ADMIN</span></div>
      <button class="btn-logout" onclick="logoutAdmin()">Sign Out</button>
    </header>

    <!-- Metrics -->
    <div class="metrics-grid">
      <div class="metric-card">
        <span class="metric-title">Total Orders</span>
        <span class="metric-value" id="stat-total-orders">-</span>
      </div>
      <div class="metric-card">
        <span class="metric-title">Total Revenue</span>
        <span class="metric-value" id="stat-revenue">₹ -</span>
      </div>
      <div class="metric-card">
        <span class="metric-title">Pending Orders</span>
        <span class="metric-value" id="stat-pending">-</span>
      </div>
    </div>

    <!-- Orders Section -->
    <section class="orders-section">
      <h2 class="section-title">Fulfillment Manager</h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Order #</th>
              <th>Date</th>
              <th>Customer</th>
              <th>Grand Total</th>
              <th>Payment Status</th>
              <th>Fulfillment Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="orders-table-body">
            <tr>
              <td colspan="7" style="text-align: center; color: #666; padding: 40px;">Loading placed orders...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Order Details Modal -->
  <div class="modal-overlay" id="detailsModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 class="modal-title" id="modalOrderNumber">Order Detail</h3>
        <button class="btn-close-modal" onclick="closeDetailsModal()">&times;</button>
      </div>
      <div id="modalContent">
        <!-- Dynamic detail rows -->
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
